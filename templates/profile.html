{% extends "base.html" %}
{% block page_title %}个人中心{% endblock %}
{% block content %}

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header"><strong><i class="bi bi-person"></i> 个人信息</strong></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('profile.update') }}">
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label">用户名</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" value="{{ current_user.username }}" readonly>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label">姓名</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" value="{{ current_user.name }}" readonly>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label">角色</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control"
                                   value="{% if current_user.is_admin %}系统管理员{% elif current_user.is_supervisor %}物业主管{% else %}巡更工作人员{% endif %}"
                                   readonly>
                        </div>
                    </div>
                    {% if current_user.is_patrol %}
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label">负责区域</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" value="{{ current_user.area or '未分配' }}" readonly>
                        </div>
                    </div>
                    {% endif %}
                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label">联系方式</label>
                        <div class="col-sm-9">
                            <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}"
                                   placeholder="请输入手机号码">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header"><strong><i class="bi bi-lock"></i> 修改密码</strong></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('profile.change_password') }}">
                    <div class="mb-3">
                        <label class="form-label">旧密码</label>
                        <input type="password" name="old_password" class="form-control" placeholder="输入旧密码" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" placeholder="输入新密码" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="再次输入新密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><strong><i class="bi bi-info-circle"></i> 系统信息</strong></div>
            <div class="card-body">
                <p class="mb-1"><strong>系统名称：</strong>智能巡更系统</p>
                <p class="mb-1"><strong>版本：</strong>V1.0</p>
                <p class="mb-1"><strong>登录账号：</strong>{{ current_user.username }}</p>
                {% if current_user.is_patrol %}
                <hr>
                <h6>提示设置</h6>
                <p class="text-muted small">当巡更不足或缺勤时，系统将通过以下方式通知您：</p>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" checked disabled>
                    <label class="form-check-label">站内提醒（默认开启）</label>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
